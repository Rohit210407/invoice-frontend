services:
  - type: static
    name: invoice-generator-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # Route all routes back to index.html to support React Router SPA client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        sync: false
